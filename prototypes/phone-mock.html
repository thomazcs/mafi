<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>MAFI — mock iPhone</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    background: #ECEAE6;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .phone {
    width: 393px; height: 830px;
    background: #111;
    border-radius: 56px;
    padding: 9px;
    box-shadow: 0 24px 60px rgba(0,0,0,.28), 0 2px 8px rgba(0,0,0,.18);
    position: relative;
  }
  .phone iframe {
    width: 100%; height: 100%;
    border: 0; border-radius: 47px;
    background: #FAFAF8;
  }
  .island {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    width: 118px; height: 34px; border-radius: 20px;
    background: #111; z-index: 2; pointer-events: none;
  }
  .bar {
    display: flex; gap: 10px; align-items: center;
    color: #8A8782; font-size: 13px;
  }
  .bar button {
    border: 1px solid #d8d5cf; background: #fff; color: #1C1B1A;
    border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer;
  }
  .bar button:hover { background: #f4f2ee; }
</style>
</head>
<body>
  <div class="phone">
    <div class="island"></div>
    <iframe id="app" src="http://localhost:5173/" title="MAFI"></iframe>
  </div>
  <div class="bar">
    <button onclick="document.getElementById('app').src = document.getElementById('app').src">↻ Recarregar</button>
    <span>precisa do <code>npm run dev</code> rodando (porta 5173)</span>
  </div>
</body>
</html>
